<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 8px;
      overflow: hidden;
      -webkit-app-region: no-drag;
    }
    .popup {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .info-bubble {
      align-self: flex-start;
      background: rgba(18, 18, 30, 0.97);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px 14px 14px 3px;
      padding: 8px 12px;
      max-width: 190px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.55);
    }
    .tool-name {
      font-size: 12px;
      font-weight: 700;
      color: #f87171;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .summary {
      font-size: 10px;
      color: #94a3b8;
      font-family: 'Courier New', monospace;
      margin-top: 4px;
      word-break: break-all;
      line-height: 1.4;
      max-height: 48px;
      overflow: hidden;
    }
    .opt-bubble {
      align-self: flex-end;
      border: none;
      border-radius: 14px 14px 3px 14px;
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: filter 0.12s, transform 0.1s;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.45);
      min-width: 100px;
      text-align: center;
      letter-spacing: 0.2px;
    }
    .opt-bubble:hover { filter: brightness(1.18); transform: scale(1.04); }
    .opt-bubble:active { transform: scale(0.96); }
    .opt-allow  { background: #16a34a; color: #ffffff; }
    .opt-always { background: #2563eb; color: #ffffff; }
    .opt-deny   { background: #b91c1c; color: #ffe4e4; }
  </style>
</head>
<body>
  <div class="popup" id="popup"></div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const toolName = params.get('toolName') || 'Permission';
    const summary  = params.get('summary')  || '';
    const options  = JSON.parse(params.get('options') || '["Allow","Deny"]');

    const popup = document.getElementById('popup');

    // Info bubble
    const info = document.createElement('div');
    info.className = 'info-bubble';
    const tname = document.createElement('div');
    tname.className = 'tool-name';
    tname.textContent = '🔐 ' + toolName;
    info.appendChild(tname);
    if (summary) {
      const sum = document.createElement('div');
      sum.className = 'summary';
      sum.textContent = summary.length > 90 ? summary.slice(0, 90) + '…' : summary;
      info.appendChild(sum);
    }
    popup.appendChild(info);

    // Option bubbles
    function optClass(opt) {
      const l = opt.toLowerCase();
      if (l === 'deny' || l === 'no') return 'opt-deny';
      if (l.includes('always') || l.includes('session')) return 'opt-always';
      return 'opt-allow';
    }

    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'opt-bubble ' + optClass(opt);
      btn.textContent = opt;
      btn.onclick = () => window.close();
      popup.appendChild(btn);
    });
  </script>
</body>
</html>
